
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bermacy RW | Secure Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #d9f0ec 0%, #c1e4df 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .simple-header {
            background: #0b3b3f;
            color: white;
            padding: 15px 5%;
            text-align: center;
        }
        .simple-header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
        }
        .simple-header span {
            color: #9effcf;
        }

        .payment-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 5%;
        }

        .payment-card {
            background: white;
            border-radius: 48px;
            max-width: 600px;
            width: 100%;
            padding: 45px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        .section-title {
            color: #0a3b3a;
            font-size: 1.4rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #eef3f2;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info, .order-summary {
            background: #f8faf9;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 25px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #4b6a6b;
        }

        .info-row strong {
            color: #0b5e5a;
        }

        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .method-card {
            border: 2px solid #e0ecea;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .method-card:hover, .method-card.active {
            border-color: #2c9c8f;
            background: #f0f9f8;
        }

        .method-card i {
            font-size: 2rem;
            color: #0b5e5a;
            margin-bottom: 10px;
            display: block;
        }

        .total-box {
            background: #0b3b3f;
            color: white;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 25px;
        }

        .total-amount {
            font-size: 1.8rem;
            font-weight: 800;
            color: #9effcf;
        }

        .pay-btn {
            background: #2c9c8f;
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .pay-btn:hover {
            background: #238378;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(44,156,143,0.3);
        }

        @media (max-width: 550px) {
            .payment-card { padding: 30px 20px; }
            .payment-methods { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="simple-header">
    <h1>BERMACY <span>RW</span></h1>
    <small>Secure Payment Gateway</small>
</div>

<div class="payment-container">
    <div class="payment-card">
        <h3 class="section-title"><i class="fas fa-user-circle"></i> Customer Details</h3>
        <div class="user-info" id="userInfo">
            <div class="info-row"><span>Name:</span><strong id="userName">Loading...</strong></div>
            <div class="info-row"><span>Email:</span><strong id="userEmail">Loading...</strong></div>
            <div class="info-row"><span>Phone:</span><strong id="userPhone">Loading...</strong></div>
        </div>

        <h3 class="section-title"><i class="fas fa-shopping-cart"></i> Order Summary</h3>
        <div class="order-summary" id="orderItems">
            <div style="text-align:center;">Retrieving items...</div>
        </div>

        <h3 class="section-title"><i class="fas fa-credit-card"></i> Payment Method</h3>
        <div class="payment-methods">
            <div class="method-card active">
                <i class="fas fa-mobile-alt"></i>
                <span>Mobile Money</span>
            </div>
            <div class="method-card">
                <i class="fas fa-university"></i>
                <span>Bank Transfer</span>
            </div>
        </div>

        <div class="total-box">
            <p>Grand Total to Pay</p>
            <div class="total-amount" id="grandTotal">0 RWF</div>
        </div>

        <button class="pay-btn" onclick="processPayment()">
            <i class="fas fa-shield-alt"></i> Confirm & Pay Now
        </button>
    </div>
</div>

<script>
    const productsData = [
        { id: 1, name: "Paracetamol 500mg", price: 1200 },
        { id: 2, name: "Ibuprofen 400mg", price: 2500 },
        { id: 3, name: "Amoxicillin 500mg", price: 3800 },
        { id: 4, name: "Vitamin C + Zinc", price: 5400 },
        { id: 5, name: "Omeprazole 20mg", price: 3600 },
        { id: 6, name: "Cetirizine 10mg", price: 1900 },
        { id: 7, name: "Azithromycin 500mg", price: 5200 },
        { id: 8, name: "Multivitamin Daily", price: 8900 }
    ];

    function initPayment() {
        const session = JSON.parse(localStorage.getItem('bermacy_session'));
        const cart = JSON.parse(localStorage.getItem('bermacy_cart'));

        if (!session || !cart || cart.length === 0) {
            alert("Session expired or cart is empty. Returning to login.");
            window.location.href = 'login.html';
            return;
        }

        document.getElementById('userName').textContent = session.name;
        document.getElementById('userEmail').textContent = session.email;
        document.getElementById('userPhone').textContent = session.mobile;

        let total = 0;
        let html = '';
        cart.forEach(item => {
            const product = productsData.find(p => p.id === item.id);
            if(product) {
                const sub = product.price * item.quantity;
                total += sub;
                html += `<div class="info-row"><span>${product.name} (x${item.quantity})</span><strong>${sub.toLocaleString()} RWF</strong></div>`;
            }
        });

        document.getElementById('orderItems').innerHTML = html;
        document.getElementById('grandTotal').textContent = total.toLocaleString() + ' RWF';
    }

    function processPayment() {
        alert("Processing secure transaction... Please wait for the prompt on your phone.");
        localStorage.removeItem('bermacy_cart');
        setTimeout(() => {
            alert("Payment successful! Thank you for shopping with Bermacy RW.");
            window.location.href = 'Shop.html';
        }, 2000);
    }

    window.onload = initPayment;
</script>
</body>
</html>
