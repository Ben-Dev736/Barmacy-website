<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bermacy RW | Login / Register - Secure Checkout</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background: linear-gradient(135deg,#d9f0ec 0%,#c1e4df 100%); min-height:100vh; display:flex; flex-direction:column; }

        .simple-header { background:#0b3b3f; color:white; padding:15px 5%; text-align:center; position:relative; }
        .simple-header h1 { font-size:1.5rem; }
        .simple-header span { color:#9effcf; }

        .back-to-shop {
            position:absolute; top:20px; left:5%;
            color:white; text-decoration:none;
            background:rgba(255,255,255,0.2);
            padding:8px 18px; border-radius:40px;
        }

        .login-container { flex:1; display:flex; justify-content:center; align-items:center; padding:40px 5%; }

        .login-card {
            background:white;
            border-radius:48px;
            max-width:500px;
            width:100%;
            padding:45px 40px;
            box-shadow:0 25px 50px rgba(0,0,0,0.15);
        }

        .tab-buttons { display:flex; gap:15px; margin-bottom:30px; background:#eef3f2; border-radius:60px; padding:5px; }

        .tab-btn {
            flex:1; padding:12px; border:none;
            background:transparent; font-weight:600;
            border-radius:50px; cursor:pointer;
        }

        .tab-btn.active { background:#0b5e5a; color:white; }

        .form-panel { display:none; }
        .form-panel.active { display:block; }

        .input-group { margin-bottom:20px; }
        .input-group input {
            width:100%;
            padding:14px;
            border:1.5px solid #e0ecea;
            border-radius:30px;
        }

        .submit-btn {
            background:#0b5e5a; color:white;
            border:none; width:100%;
            padding:15px; border-radius:40px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="simple-header">
    <a href="shop.html" class="back-to-shop">Back</a>
    <h1>BERMACY <span>RW</span></h1>
</div>

<div class="login-container">
<div class="login-card">

<div class="tab-buttons">
    <button class="tab-btn active" data-tab="login">Login</button>
    <button class="tab-btn" data-tab="register">Register</button>
</div>

<div id="loginPanel" class="form-panel active">
    <form id="loginForm">
        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="Email" required>
        </div>
        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="Password" required>
        </div>
        <button type="submit" class="submit-btn">Login</button>
    </form>
</div>

<div id="registerPanel" class="form-panel">
    <form id="registerForm">
        <div class="input-group">
            <input type="text" id="regFullName" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <input type="email" id="regEmail" placeholder="Email" required>
        </div>
        <div class="input-group">
            <input type="password" id="regPassword" placeholder="Password" required>
        </div>
        <button type="submit" class="submit-btn">Register</button>
    </form>
</div>

</div>
</div>

<script>
let cart = [];

function redirectToPayment(user){
    const form = document.createElement('form');
    form.method='POST';
    form.action='payment.php';

    document.body.appendChild(form);
    form.submit();
}

// ✅ FIXED TAB SWITCHING (ONLY CHANGE)
const tabBtns = document.querySelectorAll('.tab-btn');
const loginPanel = document.getElementById('loginPanel');
const registerPanel = document.getElementById('registerPanel');

tabBtns.forEach(btn=>{
    btn.addEventListener('click',()=>{
        const tab = btn.dataset.tab;

        tabBtns.forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');

        if(tab === 'login'){
            loginPanel.classList.add('active');
            registerPanel.classList.remove('active');
        } else {
            loginPanel.classList.remove('active');
            registerPanel.classList.add('active'); // ✅ FIXED
        }
    });
});
</script>

</body>
</html>
